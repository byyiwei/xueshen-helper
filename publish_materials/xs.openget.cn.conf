server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    http3 on;
    server_name xs.openget.cn;
    index index.html;
    root /www/wwwroot/xs.openget.cn;
    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/xs.openget.cn.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/nginx/extension/xs.openget.cn/*.conf;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/xs.openget.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/xs.openget.cn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    quic_retry on;
    quic_gso on;
    ssl_early_data on;
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    # ========== 学神助手 反向代理与静态文件 ==========

    # 0. 产品介绍页图片资源（静态托管，不需要后端）
    location ^~ /images/ {
        root /www/wwwroot/xs.openget.cn/intro;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # 1. 静态依赖文件直接由 Nginx 托管（比 Python 处理快）
    location /libs/ {
        alias /www/wwwroot/xs.openget.cn/libs/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # 2. 后台页面、用户中心静态文件
    location /static/ {
        alias /www/wwwroot/xs.openget.cn/static/;
        expires 12h;
        access_log off;
    }

    # 3. 所有其他请求反向代理到 Python 后端（API、页面、脚本分发）
    location / {
        proxy_pass http://127.0.0.1:8360;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 20m;
    }

    # ========== 配置结束 ==========

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    access_log  /www/logs/xs.openget.cn.log;
    error_log  /www/logs/xs.openget.cn.error.log;
}
