<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学神助手 - AI 后端管理</title>
<script src="/static/vue.global.js?v=2"></script>
<style>
:root{
  --bg:#0a0e1a;
  --bg2:#111827;
  --bg3:#1a2332;
  --bg4:#0f1724;
  --border:#1f2937;
  --border2:#2d3a4f;
  --text:#e5e7eb;
  --text2:#9ca3af;
  --text3:#6b7280;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --success:#10b981;
  --warn:#f59e0b;
  --danger:#ef4444;
  --radius:12px;
  --radius-sm:8px;
  --sidebar-w:220px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'PingFang SC','Microsoft YaHei','Hiragino Sans GB','WenQuanYi Micro Hei',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.6;
  overflow:hidden;
}

/* Layout */
.app-layout{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);background:var(--bg2);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  flex-shrink:0;
}
.sidebar-header{
  padding:20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sidebar-header .logo{
  width:36px;height:36px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text);
}
.sidebar-header h1{font-size:14px;font-weight:700}
.sidebar-header p{font-size:11px;color:var(--text2);margin-top:2px}
.sidebar-menu{flex:1;padding:12px;overflow-y:auto}
.menu-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:var(--radius-sm);
  color:var(--text2);font-size:13px;cursor:pointer;
  transition:all .2s;margin-bottom:4px;
}
.menu-item:hover{background:var(--bg3);color:var(--text)}
.menu-item.active{background:rgba(59,130,246,.12);color:var(--accent2);font-weight:500}
.menu-item .icon{width:20px;text-align:center;font-size:14px;color:currentColor;font-family:"SF Mono","Cascadia Code",Consolas,monospace}
.profile-avatar img,.top-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.profile-avatar{width:72px;height:72px;border-radius:22px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:24px;color:var(--text2)}
.avatar-row{display:flex;gap:16px;align-items:center;margin-bottom:16px}

/* Main content */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{
  height:56px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 96px 0 24px;
  flex-shrink:0;position:relative;
}
.main-header h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.main-header .breadcrumb{font-size:13px;color:var(--text2)}
.main-body{flex:1;overflow-y:auto;padding:24px}
.top-account{position:fixed;right:22px;top:10px;z-index:80;padding-bottom:10px}
.top-avatar{width:40px;height:40px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#2563eb);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.22);transition:transform .18s,box-shadow .18s}
.top-avatar:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.25)}
.top-menu{position:absolute;right:0;top:50px;min-width:156px;padding:8px;background:rgba(17,24,39,.98);border:1px solid rgba(96,165,250,.18);border-radius:16px;box-shadow:0 20px 48px rgba(0,0,0,.42);display:none}
.top-menu::before{content:'';position:absolute;right:14px;top:-6px;width:10px;height:10px;background:rgba(17,24,39,.98);border-left:1px solid rgba(96,165,250,.18);border-top:1px solid rgba(96,165,250,.18);transform:rotate(45deg)}
.top-account:hover .top-menu{display:block}
.top-menu button{width:100%;display:flex;align-items:center;justify-content:flex-start;gap:8px;padding:9px 10px;border:0;border-radius:10px;background:transparent;color:var(--text2);cursor:pointer;font-size:13px}
.top-menu button:hover{background:var(--bg3);color:var(--text)}
.top-menu .danger{color:#fca5a5}

/* Cards */
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:20px;overflow:hidden;
}
.card:hover{border-color:var(--border2)}
.card-header{
  padding:16px 20px;background:var(--bg3);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.card-header h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.provider-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.card-body{padding:20px}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 14px;background:var(--bg4);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;
  transition:border-color .2s,box-shadow .2s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15);
}
.form-group input::placeholder{color:var(--text3)}
.form-group textarea{min-height:80px;resize:vertical}

/* Toggle */
.toggle{
  width:44px;height:24px;border-radius:12px;background:var(--border2);
  position:relative;cursor:pointer;transition:background .3s;
}
.toggle.on{background:var(--accent)}
.toggle::after{
  content:'';position:absolute;width:18px;height:18px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:left .3s;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.toggle.on::after{left:23px}

/* Buttons */
.btn{
  padding:9px 18px;border:none;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;
}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;
}
.btn-primary:hover{opacity:.9;box-shadow:0 4px 16px rgba(59,130,246,.3)}
.btn-secondary{
  background:var(--bg3);color:var(--text2);border:1px solid var(--border);
}
.btn-secondary:hover{border-color:var(--border2);color:var(--text)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{opacity:.9}
.btn-warning{background:var(--warn);color:#111827}
.btn-warning:hover{opacity:.9}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-add{
  width:100%;padding:10px;border:1px dashed var(--border2);border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);cursor:pointer;font-size:13px;
  transition:all .2s;margin-top:6px;
}
.btn-add:hover{border-color:var(--accent);color:var(--accent)}

/* Models */
.models-title{font-size:13px;font-weight:500;color:var(--text2);margin:16px 0 10px}
.model-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;
}
.model-row input{
  padding:8px 12px;background:var(--bg4);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:13px;
  box-sizing:border-box;
}
.model-row input:focus{outline:none;border-color:var(--accent)}
.btn-del{
  width:32px;height:32px;border:none;border-radius:6px;
  background:transparent;color:var(--danger);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
  flex:none;
}
.btn-del:hover{background:rgba(239,68,68,.1)}

/* Provider tag */
.provider-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;
}
.tag-openai{background:rgba(59,130,246,.1);color:var(--accent2);border:1px solid rgba(59,130,246,.2)}
.tag-claude{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.tag-gemini{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2)}

/* Message */
.msg{
  padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;
  margin-bottom:16px;display:none;animation:slideIn .3s ease;
}
.msg.show{display:block}
.msg.success{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2)}
.msg.error{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.msg.warn{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* Status */
.status-bar{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:16px;font-size:13px;
}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.on{background:var(--success);box-shadow:0 0 8px rgba(16,185,129,.4)}
.status-dot.off{background:var(--text3)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;z-index:9999;
  padding:16px;overflow:auto;
  animation:fadeIn .2s;
}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);width:min(480px,calc(100vw - 32px));max-width:480px;padding:24px;
  animation:slideUp .3s;
}
.modal h3{margin-bottom:16px;font-size:17px}
.modal .form-row{grid-template-columns:1fr}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Info list */
.info-list .info-row{
  display:flex;align-items:center;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.info-list .info-row:last-child{border-bottom:none}
.info-list .info-label{color:var(--text2);font-size:13px;width:120px;flex-shrink:0}
.info-list .info-value{flex:1;font-size:13px;color:var(--text);word-break:break-all}
.info-list .info-value .mask{color:var(--text3);font-family:'SF Mono','Cascadia Code','Consolas','Microsoft YaHei Mono',monospace}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);width:100%;max-width:380px;padding:36px;
}
.login-card h2{text-align:center;margin-bottom:24px;font-size:20px;display:flex;align-items:center;justify-content:center;gap:8px}
.login-card input{width:100%;margin-bottom:14px}
.login-card .footer-links{display:flex;justify-content:space-between;margin-top:12px;font-size:12px}
.login-card .footer-links a{color:var(--accent2);cursor:pointer;text-decoration:none}
.login-card .footer-links a:hover{text-decoration:underline}
.slider-verify{margin:4px 0 14px;padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--bg4);user-select:none}
.slider-verify .slider-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--text2)}
.slider-verify .slider-state{color:var(--text3)}
.slider-verify.done{border-color:rgba(16,185,129,.45);background:rgba(16,185,129,.08)}
.slider-verify.done .slider-state{color:var(--success)}
.puzzle-box{position:relative;height:76px;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,#172238,#0f1724);border:1px solid rgba(96,165,250,.16);margin-bottom:10px}
.puzzle-box::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(0deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:24px 24px}
.puzzle-gap{position:absolute;top:20px;width:34px;height:34px;border-radius:9px;background:rgba(10,14,26,.78);box-shadow:inset 0 0 0 2px rgba(16,185,129,.8),0 0 18px rgba(16,185,129,.16)}
.puzzle-piece{position:absolute;top:20px;left:0;width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent2),var(--accent));box-shadow:0 8px 20px rgba(59,130,246,.32);transition:box-shadow .2s}
.slider-verify.done .puzzle-piece{background:linear-gradient(135deg,#34d399,#059669);box-shadow:0 8px 20px rgba(16,185,129,.28)}
.puzzle-track{position:relative;height:42px;border-radius:999px;background:rgba(15,23,36,.9);border:1px solid var(--border);overflow:hidden}
.puzzle-progress{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(59,130,246,.25),rgba(16,185,129,.18))}
.puzzle-thumb{position:absolute;left:0;top:3px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;color:#0f1724;cursor:grab;font-weight:900;box-shadow:0 5px 14px rgba(0,0,0,.25);touch-action:none}
.puzzle-thumb:active{cursor:grabbing}
.puzzle-tip{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;pointer-events:none}

/* Section title */
.section-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
/* Collapsible section (pay api config etc.) */
.collapsible-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;overflow:hidden}
.collapsible-section:hover{border-color:var(--border2)}
.collapsible-section .section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0;padding:16px 20px;border-bottom:none;cursor:pointer;user-select:none;background:var(--bg3)}
.collapsible-section .section-title:hover{background:var(--bg4)}
.collapsible-section .section-title .st-text{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
.collapsible-section .section-title .st-right{display:flex;align-items:center;gap:12px}
.collapsible-section .section-title .st-arrow{font-size:12px;color:var(--text3);min-width:56px;text-align:right;white-space:nowrap}
.collapsible-section .section-body{padding:20px}
.filter-grid{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.filter-grid input,.filter-grid select{padding:8px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px}
.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:12px;color:var(--text2);font-size:12px}
.log-detail{margin-top:8px;padding:10px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;white-space:pre-wrap;word-break:break-word;color:var(--text2)}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;background:rgba(59,130,246,.12);color:var(--accent2);font-size:11px}

/* Dashboard */
.dashboard-hero{position:relative;overflow:hidden;border:1px solid rgba(96,165,250,.16);border-radius:18px;padding:22px;margin-bottom:18px;background:radial-gradient(circle at 12% 10%,rgba(59,130,246,.28),transparent 32%),linear-gradient(135deg,#0f1724,#111827 62%,#0b1120)}
.dashboard-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.06),transparent);transform:translateX(-70%);animation:dashSweep 5s infinite}
.dashboard-hero h2{position:relative;font-size:24px;margin-bottom:6px;letter-spacing:.5px}
.dashboard-hero p{position:relative;color:var(--text2);font-size:13px}
@keyframes dashSweep{50%,100%{transform:translateX(120%)}}
.metric-grid{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:14px;margin-bottom:18px}
.metric-card{position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(26,35,50,.92),rgba(15,23,36,.92));border:1px solid rgba(96,165,250,.12);border-radius:16px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.metric-card::before{content:'';position:absolute;right:-28px;top:-28px;width:72px;height:72px;border-radius:50%;background:rgba(96,165,250,.1)}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:8px}
.metric-value{font-size:28px;font-weight:800;letter-spacing:.5px}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}
.dash-grid{display:grid;grid-template-columns:1.45fr .9fr;gap:18px}
      .dash-toolbar{margin-bottom:18px}
      .date-range{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px}
      .date-field{display:flex;align-items:center;gap:6px}
      .date-label{font-size:12px;color:var(--text3);font-weight:600;white-space:nowrap}
      .date-input{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;outline:none;transition:border-color .2s;color-scheme:dark;min-width:130px}
      .date-input::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer;opacity:.8;transition:opacity .2s}
      .date-input::-webkit-calendar-picker-indicator:hover{opacity:1}
      .date-input:hover{border-color:var(--accent)}
      .date-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
      .date-sep{color:var(--text3);font-size:14px}
      .date-quicks{display:flex;gap:6px;margin-left:8px;padding-left:12px;border-left:1px solid var(--border)}
      .date-quick{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
      .date-quick:hover{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.06)}
      .date-quick.active{background:var(--accent);color:#fff;border-color:var(--accent)}
      .revenue-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
      .revenue-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
      .revenue-label{font-size:12px;color:var(--text3);margin-bottom:6px}
      .revenue-value{font-size:26px;font-weight:800;letter-spacing:.5px}
      .revenue-sub{font-size:11px;color:var(--text3);margin-top:4px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;overflow:hidden}
.chart-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chart-title h3{font-size:15px}
.chart-title span{font-size:12px;color:var(--text3)}
.line-chart{width:100%;height:240px;background:linear-gradient(180deg,rgba(59,130,246,.06),transparent);border-radius:14px}
.bar-list{display:flex;flex-direction:column;gap:12px}
.bar-row{display:grid;grid-template-columns:130px 1fr 44px;align-items:center;gap:10px;font-size:12px}
.bar-name{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{height:10px;border-radius:999px;background:var(--bg4);overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--success))}
.stack-bars{display:flex;align-items:end;gap:10px;height:190px;padding-top:12px}
.stack-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.stack-col{height:145px;width:100%;display:flex;align-items:end;gap:2px;justify-content:center}
.stack-ok,.stack-bad{width:18px;border-radius:8px 8px 3px 3px;min-height:3px}
.stack-ok{background:var(--success)}
.stack-bad{background:var(--danger)}
.stack-label{font-size:11px;color:var(--text3)}

/* Responsive */
@media(max-width:768px){
  .app-layout{display:block;height:100vh;height:100dvh}
  .sidebar{
    position:fixed;left:10px;right:10px;bottom:10px;z-index:50;
    width:auto;height:66px;overflow:hidden;border:1px solid rgba(96,165,250,.18);
    border-radius:22px;background:rgba(17,24,39,.92);backdrop-filter:blur(18px);
    box-shadow:0 18px 46px rgba(0,0,0,.38);
  }
  .sidebar-header{display:none}
  .sidebar-menu{
    height:100%;display:flex;align-items:center;gap:6px;padding:8px;
    overflow-x:auto;overflow-y:hidden;scrollbar-width:none;
  }
  .sidebar-menu::-webkit-scrollbar{display:none}
  .menu-item{
    flex:0 0 auto;min-width:62px;height:50px;justify-content:center;flex-direction:column;
    padding:7px 8px;font-size:11px;line-height:1.15;gap:4px;margin:0;border-radius:16px;
    color:#9ca3af;text-align:center;
  }
  .menu-item .icon{width:auto;font-size:16px;line-height:1}
  .menu-item.active{
    background:linear-gradient(180deg,rgba(59,130,246,.28),rgba(37,99,235,.18));
    color:#dbeafe;box-shadow:inset 0 0 0 1px rgba(96,165,250,.22);
  }
  .main-content{height:100vh;height:100dvh}
  .top-account{right:12px;top:8px}
  .main-header{padding:0 70px 0 16px}
  .main-header .breadcrumb{display:none}
  .form-row{grid-template-columns:1fr}
  .model-row{flex-wrap:wrap}
  .model-row input{flex:1 1 100% !important;width:100% !important}
  .model-row .btn-del{width:100%;height:34px}
  .status-bar{align-items:flex-start;flex-wrap:wrap}
  .status-bar>span:last-child{margin-left:0!important;width:100%;justify-content:flex-start}
  .card-header{align-items:flex-start;flex-direction:column}
  .provider-actions{width:100%;justify-content:flex-start}
  .metric-grid,.dash-grid{grid-template-columns:1fr}
  .main-body{padding:16px 16px 96px}
}
</style>
</head>
<body>
<div id="app">
  <!-- ==================== LOGIN ==================== -->
  <div v-if="page==='login'" class="login-wrap">
    <!-- Normal Login -->
    <div v-if="loginMode==='login'" class="login-card">
      <h2>后台管理登录</h2>
      <div :class="['msg',msg.show&&'show',msg.type]" v-html="msg.text"></div>
      <div class="form-group"><input type="text" v-model="loginForm.username" placeholder="管理员用户名" autocomplete="username"></div>
      <div class="form-group"><input type="password" v-model="loginForm.password" placeholder="管理密码" autocomplete="current-password" @keydown.enter="doLogin"></div>
      <div :class="['slider-verify',adminSlider.verified&&'done']">
        <div class="slider-top">
          <span>滑块验证</span>
          <span class="slider-state">{{adminSlider.verified?'验证通过':'拖动拼图到缺口'}}</span>
        </div>
        <div class="puzzle-box">
          <span class="puzzle-gap" :style="{left:'calc('+(adminSlider.target/260*100)+'%)',transform:'translateX(-50%)'}"></span>
          <span class="puzzle-piece" :style="{left:'calc('+(adminSlider.x/260*100)+'%)',transform:'translateX(-50%)'}"></span>
        </div>
        <div class="puzzle-track">
          <div class="puzzle-progress" :style="{width:(adminSlider.x/260*100)+'%'}"></div>
          <span class="puzzle-tip">{{adminSlider.verified?'验证通过':'按住滑块，拖动完成拼图'}}</span>
          <button type="button" class="puzzle-thumb" :style="{left:'calc('+(adminSlider.x/260*100)+'% - 18px)'}" @mousedown="beginAdminPuzzle" @touchstart.prevent="beginAdminPuzzle">›</button>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%" @click="doLogin">登 录</button>
      <div class="footer-links">
        <a @click="loginMode='forgot'">忘记密码？</a>
      </div>
    </div>
    <!-- Forgot Password -->
    <div v-else-if="loginMode==='forgot'" class="login-card">
      <h2>找回密码</h2>
      <div :class="['msg',msg.show&&'show',msg.type]" v-html="msg.text"></div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">输入已绑定的管理员邮箱，系统将发送重置验证码</p>
      <div class="form-group"><input type="email" v-model="forgotForm.email" placeholder="邮箱地址" @keydown.enter="doForgot"></div>
      <button class="btn btn-primary" style="width:100%" @click="doForgot">发送验证码</button>
      <div class="footer-links">
        <a @click="loginMode='login'">← 返回登录</a>
      </div>
    </div>
    <!-- Reset Password -->
    <div v-else-if="loginMode==='reset'" class="login-card">
      <h2>重置密码</h2>
      <div :class="['msg',msg.show&&'show',msg.type]" v-html="msg.text"></div>
      <div class="form-group"><input type="email" v-model="resetForm.email" placeholder="绑定邮箱"></div>
      <div class="form-group"><input v-model="resetForm.code" placeholder="邮箱验证码"></div>
      <div class="form-group"><input type="password" v-model="resetForm.newPassword" placeholder="新密码"></div>
      <div class="form-group"><input type="password" v-model="resetForm.confirmPassword" placeholder="确认新密码" @keydown.enter="doReset"></div>
      <button class="btn btn-primary" style="width:100%" @click="doReset">确认重置</button>
    </div>
  </div>

  <!-- ==================== MAIN ==================== -->
  <div v-else class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">◎</div>
        <div>
          <h1>后台管理</h1>
          <p>AI 答题服务</p>
        </div>
      </div>
      <nav class="sidebar-menu">
        <div class="menu-item" :class="{active:page==='dashboard'}" @click="page='dashboard';loadDashboard()">
          <span class="icon">⌂</span>运营概览
        </div>
        <div class="menu-item" :class="{active:page==='user-mgmt'}" @click="page='user-mgmt';loadUsers()">
          <span class="icon">◯</span>用户管理
        </div>
        <div class="menu-item" :class="{active:page==='login-locks'}" @click="page='login-locks';loadLoginLocks()">
          <span class="icon">⊘</span>解除锁定
        </div>
        <div class="menu-item" :class="{active:page==='question-bank'}" @click="page='question-bank';loadQuestionBank()">
          <span class="icon">▤</span>题库中心
        </div>
        <div class="menu-item" :class="{active:page==='script-logs'}" @click="page='script-logs';loadScriptLogs()">
          <span class="icon">⌘</span>脚本日志
        </div>
        <div class="menu-item" :class="{active:page==='ai-logs'}" @click="page='ai-logs';loadAiLogs()">
          <span class="icon">☰</span>模型日志
        </div>
        <div class="menu-item" :class="{active:page==='ai-config'}" @click="page='ai-config';loadConfig()">
          <span class="icon">◇</span>模型配置
        </div>
        <div class="menu-item" :class="{active:page==='email-config'}" @click="page='email-config';loadEmailConfig()">
          <span class="icon">✉</span>邮箱配置
        </div>
        <div class="menu-item" :class="{active:page==='payment'}" @click="page='payment';loadPaymentConfig()">
          <span class="icon">□</span>付费配置
        </div>
        <div class="menu-item" :class="{active:page==='pay-api'}" @click="page='pay-api';loadPayApiConfig()">
          <span class="icon">⌁</span>支付接口
        </div>
        <div class="menu-item" :class="{active:page==='log-cleanup'}" @click="page='log-cleanup';loadLogCleanup()">
          <span class="icon">∅</span>日志清理
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-account">
        <div class="top-avatar"><img v-if="accountConfig.avatar_data" :src="accountConfig.avatar_data"><span v-else>◌</span></div>
        <div class="top-menu">
          <button @click="page='profile';loadAdminAccount();loadEmailConfig()">个人中心</button>
          <button class="danger" @click="logout">退出登录</button>
        </div>
      </div>
      <!-- Dashboard Page -->
      <template v-if="page==='dashboard'">
        <header class="main-header">
          <h2>运营概览</h2>
          <span class="breadcrumb">系统运行数据与模型调用趋势</span>
        </header>
        <div class="main-body">
          <div :class="['msg',msg.show&&'show',msg.type]" v-html="msg.text"></div>
          <div class="dashboard-hero">
            <h2>后端运行概览</h2>
            <p>活跃数按所选时间范围内有模型请求的不同客户端统计，趋势图展示所选时间范围内的调用与题库命中情况。</p>
          </div>
          <div class="dash-toolbar">
            <div class="date-range">
              <div class="date-field">
                <span class="date-label">开始</span>
                <input type="date" v-model="dashStartDate" @change="loadDashboard()" class="date-input">
              </div>
              <span class="date-sep">—</span>
              <div class="date-field">
                <span class="date-label">结束</span>
                <input type="date" v-model="dashEndDate" @change="loadDashboard()" class="date-input">
              </div>
              <div class="date-quicks">
                <button class="date-quick" :class="{active:dashStartDate===todayStr&&dashEndDate===todayStr}" @click="setQuickRange('today')">今天</button>
                <button class="date-quick" :class="{active:dashStartDate===d7ago&&dashEndDate===todayStr}" @click="setQuickRange('7')">近7天</button>
                <button class="date-quick" :class="{active:dashStartDate===d30ago&&dashEndDate===todayStr}" @click="setQuickRange('30')">近30天</button>
                <button class="date-quick" :class="{active:dashStartDate===d90ago&&dashEndDate===todayStr}" @click="setQuickRange('90')">近90天</button>
              </div>
            </div>
          </div>
          <div class="metric-grid">
            <div class="metric-card"><div class="metric-label">用户数</div><div class="metric-value">{{dashboard.cards.users||0}}</div><div class="metric-sub">注册账户总数</div></div>
            <div class="metric-card"><div class="metric-label">活跃数</div><div class="metric-value">{{dashboard.cards.active||0}}</div><div class="metric-sub">近 24 小时客户端</div></div>
            <div class="metric-card"><div class="metric-label">题库总数</div><div class="metric-value">{{dashboard.cards.question_bank||0}}</div><div class="metric-sub">已沉淀题目</div></div>
            <div class="metric-card"><div class="metric-label">题库命中数</div><div class="metric-value" style="color:var(--success)">{{dashboard.cards.bank_hits||0}}</div><div class="metric-sub">题库直接返回答案</div></div>
            <div class="metric-card"><div class="metric-label">题库命中率</div><div class="metric-value" style="color:var(--accent2)">{{dashboard.cards.bank_hit_rate||0}}%</div><div class="metric-sub">占成功答题比例</div></div>
            <div class="metric-card"><div class="metric-label">模型调用数</div><div class="metric-value">{{dashboard.cards.calls||0}}</div><div class="metric-sub">累计请求</div></div>
            <div class="metric-card"><div class="metric-label">成功数</div><div class="metric-value" style="color:var(--success)">{{dashboard.cards.success||0}}</div><div class="metric-sub">成功返回答案</div></div>
            <div class="metric-card"><div class="metric-label">失败数</div><div class="metric-value" style="color:var(--danger)">{{dashboard.cards.error||0}}</div><div class="metric-sub">接口失败或异常</div></div>
          </div>
          <div class="dash-grid">
            <div class="chart-card">
              <div class="chart-title"><h3>调用折线图</h3><span>总调用 / 成功 / 失败</span></div>
              <div style="display:flex;gap:16px;margin-bottom:8px;font-size:12px">
                <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#60a5fa;border-radius:2px"></span>总调用</span>
                <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#10b981;border-radius:2px"></span>成功</span>
                <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#ef4444;border-radius:2px"></span>失败</span>
              </div>
              <svg class="line-chart" viewBox="0 0 700 240" preserveAspectRatio="xMidYMid meet" style="width:100%;height:260px">
                <g stroke="rgba(255,255,255,.06)" stroke-width="1">
                  <line x1="40" y1="35" x2="680" y2="35"></line>
                  <line x1="40" y1="80" x2="680" y2="80"></line>
                  <line x1="40" y1="125" x2="680" y2="125"></line>
                  <line x1="40" y1="170" x2="680" y2="170"></line>
                  <line x1="40" y1="205" x2="680" y2="205"></line>
                </g>
                <g fill="#6b7280" font-size="10" text-anchor="end">
                  <text x="34" y="38">{{Math.ceil(trendMax())}}</text>
                  <text x="34" y="128">{{Math.ceil(trendMax()/2)}}</text>
                  <text x="34" y="208">0</text>
                </g>
                <template v-if="dashboard.trend.length>1">
                  <polyline :points="trendPoints('total')" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
                  <polyline :points="trendPoints('success')" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
                  <polyline :points="trendPoints('error')" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
                </template>
                <g v-for="(r,i) in dashboard.trend" :key="r.day">
                  <template v-if="dashboard.trend.length<=1">
                    <rect :x="trendX(i)-25" :y="trendY(r.total)" width="16" :height="205-trendY(r.total)" fill="#60a5fa" rx="2"></rect>
                    <rect :x="trendX(i)-7" :y="trendY(r.success)" width="16" :height="205-trendY(r.success)" fill="#10b981" rx="2"></rect>
                    <rect :x="trendX(i)+11" :y="trendY(r.error)" width="16" :height="205-trendY(r.error)" fill="#ef4444" rx="2"></rect>
                    <text :x="trendX(i)-17" :y="trendY(r.total)-5" fill="#60a5fa" font-size="10" text-anchor="middle" font-weight="700">{{r.total}}</text>
                    <text :x="trendX(i)+1" :y="trendY(r.success)-5" fill="#10b981" font-size="10" text-anchor="middle" font-weight="700">{{r.success}}</text>
                    <text :x="trendX(i)+19" :y="trendY(r.error)-5" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="700">{{r.error}}</text>
                  </template>
                  <template v-else>
                    <circle :cx="trendX(i)" :cy="trendY(r.total)" r="3" fill="#60a5fa"></circle>
                    <circle :cx="trendX(i)" :cy="trendY(r.success)" r="3" fill="#10b981"></circle>
                    <circle :cx="trendX(i)" :cy="trendY(r.error)" r="3" fill="#ef4444"></circle>
                  </template>
                  <text v-if="dashboard.trend.length<=14 || i%2===0" :x="trendX(i)" y="225" fill="#6b7280" font-size="10" text-anchor="middle">{{r.label}}</text>
                </g>
                <text v-if="!dashboard.trend.length" x="350" y="120" fill="var(--text3)" font-size="13" text-anchor="middle">暂无调用数据</text>
              </svg>
            </div>
            <div class="chart-card">
              <div class="chart-title"><h3>成功/失败组合图</h3><span>按所选时间</span></div>
              <div style="display:flex;gap:16px;margin-bottom:8px;font-size:12px">
                <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:#10b981;border-radius:3px"></span>成功</span>
                <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:#ef4444;border-radius:3px"></span>失败</span>
              </div>
              <svg class="line-chart" viewBox="0 0 700 240" preserveAspectRatio="xMidYMid meet" style="width:100%;height:240px">
                <g stroke="rgba(255,255,255,.06)" stroke-width="1">
                  <line x1="40" y1="35" x2="680" y2="35"></line>
                  <line x1="40" y1="80" x2="680" y2="80"></line>
                  <line x1="40" y1="125" x2="680" y2="125"></line>
                  <line x1="40" y1="170" x2="680" y2="170"></line>
                  <line x1="40" y1="205" x2="680" y2="205"></line>
                </g>
                <g fill="#6b7280" font-size="10" text-anchor="end">
                  <text x="34" y="38">{{Math.ceil(trendMax())}}</text>
                  <text x="34" y="128">{{Math.ceil(trendMax()/2)}}</text>
                  <text x="34" y="208">0</text>
                </g>
                <g v-for="(r,i) in dashboard.trend" :key="r.day">
                  <rect :x="stackBarX(i)" :y="stackBarY(r.success)" width="14" :height="stackBarH(r.success)" fill="#10b981" rx="2"></rect>
                  <rect :x="stackBarX(i)+16" :y="stackBarY(r.error)" width="14" :height="stackBarH(r.error)" fill="#ef4444" rx="2"></rect>
                  <text v-if="r.success>0" :x="stackBarX(i)+7" :y="stackBarY(r.success)-4" fill="#10b981" font-size="9" text-anchor="middle" font-weight="600">{{r.success}}</text>
                  <text v-if="r.error>0" :x="stackBarX(i)+23" :y="stackBarY(r.error)-4" fill="#ef4444" font-size="9" text-anchor="middle" font-weight="600">{{r.error}}</text>
                  <text v-if="dashboard.trend.length<=14 || i%2===0" :x="stackBarX(i)+15" y="225" fill="#6b7280" font-size="10" text-anchor="middle">{{r.label}}</text>
                </g>
                <text v-if="!dashboard.trend.length" x="350" y="120" fill="var(--text3)" font-size="13" text-anchor="middle">暂无数据</text>
              </svg>
            </div>
          </div>
          <div class="chart-card" style="margin-top:18px">
            <div class="chart-title"><h3>模型调用分布</h3><span>按成功 AI 调用统计，不含题库命中</span></div>
            <div class="bar-list">
              <div class="bar-row" v-for="m in dashboard.models" :key="m.model">
                <div class="bar-name" :title="m.model">{{m.model}}</div>
                <div class="bar-track"><div class="bar-fill" :style="{width:modelBarWidth(m.total)}"></div></div>
                <div style="color:var(--text2);text-align:right">{{m.total}}</div>
              </div>
              <div v-if="!dashboard.models.length" style="color:var(--text3);font-size:13px;padding:20px;text-align:center">暂无模型调用数据</div>
            </div>
          </div>
          <div class="chart-card" style="margin-top:18px">
            <div class="chart-title"><h3>模型Token消耗</h3><span>所选时间范围累计 · 今日用量实时更新</span></div>
            <table v-if="(dashboard.token_usage||[]).length" style="width:100%;border-collapse:collapse;font-size:13px">
              <thead>
                <tr style="border-bottom:1px solid var(--border)">
                  <th style="text-align:left;padding:8px">模型</th>
                  <th style="text-align:right;padding:8px">累计Token</th>
                  <th style="text-align:right;padding:8px">调用次数</th>
                  <th style="text-align:right;padding:8px">今日已用</th>
                  <th style="text-align:right;padding:8px">每日限额</th>
                  <th style="text-align:right;padding:8px">今日剩余</th>
                  <th style="text-align:center;padding:8px">状态</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="t in dashboard.token_usage" :key="t.model" style="border-bottom:1px solid var(--border)">
                  <td style="padding:8px">{{t.model}}</td>
                  <td style="padding:8px;text-align:right">{{t.total_tokens.toLocaleString()}}</td>
                  <td style="padding:8px;text-align:right">{{t.call_count}}</td>
                  <td style="padding:8px;text-align:right;color:#60a5fa">{{t.today_tokens.toLocaleString()}}</td>
                  <td style="padding:8px;text-align:right">{{t.daily_limit>0?t.daily_limit.toLocaleString():'不限'}}</td>
                  <td style="padding:8px;text-align:right" :style="{color:t.today_remaining===0?'#ef4444':t.daily_limit>0&&t.today_remaining<10000?'#f59e0b':'var(--text2)'}">{{t.daily_limit>0?t.today_remaining.toLocaleString():'—'}}</td>
                  <td style="padding:8px;text-align:center">
                    <span v-if="t.daily_limit<=0" style="color:var(--text3)">未限额</span>
                    <span v-else-if="t.today_remaining===0" style="color:#ef4444">已耗尽</span>
                    <span v-else style="color:#10b981">可用</span>
                  </td>
                </tr>
              </tbody>
            </table>
            <div v-if="!(dashboard.token_usage||[]).length" style="color:var(--text3);font-size:13px;padding:20px;text-align:center">暂无Token消耗数据</div>
          </div>
          <div class="chart-card" style="margin-top:18px">
            <div class="chart-title"><h3>收入概况</h3><span>所选时间范围内已支付订单</span></div>
            <div class="revenue-grid">
              <div class="revenue-card">
                <div class="revenue-label">总收入</div>
                <div class="revenue-value" style="color:var(--success)">¥{{dashboard.revenue?.total?.toFixed(2)||'0.00'}}</div>
                <div class="revenue-sub">{{dashboard.revenue?.orders||0}} 笔订单</div>
              </div>
              <div class="revenue-card">
                <div class="revenue-label">包月收入</div>
                <div class="revenue-value">¥{{dashboard.revenue?.monthly_revenue?.toFixed(2)||'0.00'}}</div>
                <div class="revenue-sub">{{dashboard.revenue?.monthly_orders||0}} 笔</div>
              </div>
              <div class="revenue-card">
                <div class="revenue-label">题数收入</div>
                <div class="revenue-value">¥{{dashboard.revenue?.points_revenue?.toFixed(2)||'0.00'}}</div>
                <div class="revenue-sub">{{dashboard.revenue?.points_orders||0}} 笔</div>
              </div>
            </div>
            <div class="chart-title" style="margin-top:18px"><h4 style="font-size:14px;color:var(--text2)">收入趋势</h4><span>每日收入（元）</span></div>
            <svg class="line-chart" viewBox="0 0 700 200" preserveAspectRatio="xMidYMid meet" style="width:100%;height:200px">
              <g stroke="rgba(255,255,255,.06)" stroke-width="1">
                <line x1="40" y1="30" x2="680" y2="30"></line>
                <line x1="40" y1="70" x2="680" y2="70"></line>
                <line x1="40" y1="110" x2="680" y2="110"></line>
                <line x1="40" y1="150" x2="680" y2="150"></line>
                <line x1="40" y1="170" x2="680" y2="170"></line>
              </g>
              <g fill="#6b7280" font-size="10" text-anchor="end">
                <text x="34" y="33">¥{{revMax().toFixed(0)}}</text>
                <text x="34" y="113">¥{{(revMax()/2).toFixed(0)}}</text>
                <text x="34" y="173">0</text>
              </g>
              <template v-if="(dashboard.revenue?.trend||[]).length>1">
                <polyline :points="revTrendArea()" fill="rgba(16,185,129,.08)" stroke="none"></polyline>
                <polyline :points="revTrendPoints()" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
              </template>
              <g v-for="(r,i) in (dashboard.revenue?.trend||[])" :key="r.day">
                <template v-if="(dashboard.revenue?.trend||[]).length<=1 && r.revenue>0">
                  <rect :x="revTrendX(i)-15" :y="revY(r.revenue)" width="30" :height="170-revY(r.revenue)" fill="#10b981" rx="2" opacity="0.8"></rect>
                  <text :x="revTrendX(i)" :y="revY(r.revenue)-8" fill="#10b981" font-size="11" text-anchor="middle" font-weight="700">¥{{r.revenue}}</text>
                </template>
                <template v-else-if="r.revenue>0">
                  <circle :cx="revTrendX(i)" :cy="revY(r.revenue)" r="3" fill="#10b981"></circle>
                  <text :x="revTrendX(i)" :y="revY(r.revenue)-8" fill="#10b981" font-size="10" text-anchor="middle" font-weight="700">¥{{r.revenue}}</text>
                </template>
                <text v-if="(dashboard.revenue?.trend||[]).length<=14 || i%2===0" :x="revTrendX(i)" y="188" fill="#6b7280" font-size="10" text-anchor="middle">{{r.label}}</text>
              </g>
              <text v-if="!(dashboard.revenue?.trend||[]).length || !(dashboard.revenue?.trend||[]).some(r=>r.revenue>0)" x="350" y="100" fill="var(--text3)" font-size="13" text-anchor="middle">暂无收入数据</text>

              <button class="btn btn-secondary" :disabled="logCleanupRunning" @click="runLogCleanupNow">{{logCleanupRunning?'清理中...':'立即执行清理'}}</button>

    <div v-if="showUserModal" class="modal-overlay" @click.self="showUserModal=false">

</div>

<script>
const {createApp,ref,computed,reactive}=Vue;

createApp({
  setup(){
    const page=ref('login');
    const loginMode=ref('login');
    const token=ref(localStorage.getItem('ne21_admin_token')||'');
    const config=ref({providers:{}});
    const emailConfig=ref({enabled:false,smtp_host:'',smtp_port:587,smtp_user:'',smtp_pass:'',from_addr:'',test_recipient:''});
    const msg=reactive({show:false,text:'',type:'success'});
    const showAddModal=ref(false);
    const newProvider=reactive({key:'',title:'',protocol:'openai',api_key:'',base_url:'',models:[]});
    const loginForm=reactive({username:'admin',password:''});
    const forgotForm=reactive({email:''});
    const resetForm=reactive({email:'',code:'',newPassword:'',confirmPassword:''});
    const pwdForm=reactive({old:'',new:'',confirm:''});
    const accountConfig=reactive({username:'admin',admin_email:'',avatar_data:''});
    const users=ref([]);
    const showUserModal=ref(false);
    const userForm=reactive({username:'',email:'',password:'',points_delta:0,member_days_delta:0,member_until:'',is_banned:false,ban_reason:'',reason:''});
    const paymentPlans=ref([]);
    const paymentConfig=reactive({gift_type:'none',gift_points:0,gift_days:0});
    const payApiConfig=reactive({
      // 支付宝官方
      alipay_enabled:false,alipay_app_id:'',alipay_gateway:'https://openapi.alipay.com/gateway.do',alipay_private_key:'',alipay_public_key:'',
      // 微信支付官方
      wechat_enabled:false,wechat_app_id:'',wechat_mch_id:'',wechat_api_key:'',wechat_apiv3_key:'',wechat_cert_serial:'',wechat_private_key:'',wechat_notify_url:'',
      // 支付FM
      zhifufm_enabled:false,zhifufm_api_url:'',zhifufm_merchant_num:'',zhifufm_secret:'',zhifufm_notify_url:'',zhifufm_return_url:'',
      // 杉德河马
      sandpay_enabled:false,sandpay_mid:'',sandpay_api_url:'',sandpay_private_key:'',sandpay_public_key:'',sandpay_notify_url:'',sandpay_return_url:'',
      // 易支付
      epay_enabled:false,epay_api_url:'',epay_pid:'',epay_key:'',epay_notify_url:'',epay_return_url:''
    });
    const payApiCollapsed=reactive({alipay:true,wechat:true,zhifufm:true,sandpay:true,epay:true});
    const planForm=reactive({id:null,name:'',plan_type:'points',price:0,points:0,days:30,enabled:true,sort_order:0});
    const aiLogs=ref([]);
    const aiLogLoading=ref(false);
    const aiLogTotal=ref(0);
    const expandedLogs=reactive({});
    const aiLogFilter=reactive({status:'',model:'',keyword:'',date_from:'',date_to:'',limit:100,page:1});
    const scriptLogs=ref([]);
    const scriptLogLoading=ref(false);
    const scriptLogTotal=ref(0);
    const scriptLogFilter=reactive({username:'',level:'',keyword:'',date_from:'',date_to:'',limit:100,page:1});
    const questionBank=ref([]);
    const questionBankTotal=ref(0);
    const questionBankLoading=ref(false);
    const expandedBank=reactive({});
    const questionBankFilter=reactive({keyword:'',limit:100,page:1});
    const loginLocks=ref([]);
    const loginLockLoading=ref(false);
    const saveConfigLoading=ref(false);
    const logRetentionDays=ref(0);
    const logCleanupSaving=ref(false);
    const logCleanupRunning=ref(false);
    const logCleanupResult=ref(null);
    const collapsedProviders=reactive(JSON.parse(localStorage.getItem('ne21_collapsed_providers')||'{}'));
    const dashboard=ref({cards:{users:0,active:0,question_bank:0,calls:0,success:0,error:0,bank_hits:0,bank_hit_rate:0},trend:[],models:[]});
    const dashStartDate=ref(new Date().toISOString().slice(0,10));
    const dashEndDate=ref(new Date().toISOString().slice(0,10));
    const todayStr=new Date().toISOString().slice(0,10);
    const d7ago=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
    const d30ago=new Date(Date.now()-30*86400000).toISOString().slice(0,10);
    const d90ago=new Date(Date.now()-90*86400000).toISOString().slice(0,10);
    const adminSlider=reactive({id:'',target:130,x:0,token:'',verified:false,loading:false,dragging:false,trackEl:null});
    const providerReadyCount=ref(0);
    const providerTotalCount=ref(0);

    function providerReadyLocal(p){
      const enabled=p&&((p.enabled===true)||p.enabled===1||String(p.enabled).toLowerCase()==='true'||String(p.enabled)==='1');
      return !!(enabled&&String(p.api_key||'').trim()&&(p.models||[]).length);
    }
    const providerEntries=computed(()=>Object.entries(config.value?.providers||{}).map(([key,info])=>({
      key,
      info:{enabled:false,title:key,protocol:'openai',api_key:'',base_url:'',models:[],...(info||{})}
    })));
    const enabledCount=computed(()=>providerReadyCount.value||Object.values(config.value.providers||{}).filter(providerReadyLocal).length);

    function showMsg(text,type='success',duration=3000){
      msg.text=text;msg.type=type;msg.show=true;
      if(duration)setTimeout(()=>msg.show=false,duration);
    }
    async function safeFetch(url,options){
      try{
        return await fetch(url,options);
      }catch(e){
        throw new Error('无法连接后端服务，请确认 https://xs.openget.cn 正在运行，并刷新后台页面');
      }
    }

    // Auth
    async function initAdminSlider(){
      adminSlider.loading=true;
      Object.assign(adminSlider,{x:0,token:'',verified:false,dragging:false});
      try{
        const res=await fetch('/api/slider-captcha/start?scope=admin');
        const data=await res.json();
        const c=data.captcha||{};
        Object.assign(adminSlider,{id:c.id||'',target:Number(c.target_hint||130),x:0,token:'',verified:false});
      }catch(e){showMsg('滑块验证初始化失败，请刷新页面','error',5000);}
      finally{adminSlider.loading=false;}
    }
    async function resetAdminSlider(message){
      Object.assign(adminSlider,{id:'',target:130,x:0,token:'',verified:false,dragging:false});
      if(message)showMsg(message,'error',2200);
      await initAdminSlider();
    }
    async function verifyAdminSlider(){
      if(adminSlider.verified||!adminSlider.id)return;
      adminSlider.loading=true;
      try{
        const res=await fetch('/api/slider-captcha/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scope:'admin',id:adminSlider.id,x:adminSlider.x})});
        const data=await res.json();
        if(data.code===200){adminSlider.token=data.token;adminSlider.verified=true;showMsg('滑块验证通过','success',1200);}
        else{await resetAdminSlider(data.msg||'滑块验证失败，请重新拖动');}
      }catch(e){await resetAdminSlider('滑块验证失败，请重新拖动');}
      finally{adminSlider.loading=false;}
    }
    async function ensureAdminSliderVerified(){
      if(adminSlider.verified&&adminSlider.token)return true;
      if(adminSlider.loading){
        for(let i=0;i<20&&adminSlider.loading;i++)await new Promise(r=>setTimeout(r,100));
        if(adminSlider.verified&&adminSlider.token)return true;
      }
      if(adminSlider.id){
        await verifyAdminSlider();
        return !!(adminSlider.verified&&adminSlider.token);
      }
      return false;
    }
    function beginAdminPuzzle(e){
      if(adminSlider.verified||adminSlider.loading)return;
      adminSlider.dragging=true;
      adminSlider.trackEl=e.currentTarget.closest('.puzzle-track');
      const move=(ev)=>{
        if(!adminSlider.dragging||!adminSlider.trackEl)return;
        const point=ev.touches?ev.touches[0]:ev;
        const rect=adminSlider.trackEl.getBoundingClientRect();
        const ratio=Math.max(0,Math.min(1,(point.clientX-rect.left)/rect.width));
        adminSlider.x=Math.round(ratio*260);
      };
      const up=async()=>{
        adminSlider.dragging=false;
        document.removeEventListener('mousemove',move);
        document.removeEventListener('mouseup',up);
        document.removeEventListener('touchmove',move);
        document.removeEventListener('touchend',up);
        await verifyAdminSlider();
      };
      document.addEventListener('mousemove',move);
      document.addEventListener('mouseup',up);
      document.addEventListener('touchmove',move,{passive:false});
      document.addEventListener('touchend',up);
      move(e);
    }
    async function doLogin(){
      if(!loginForm.username||!loginForm.password)return showMsg('请输入管理员用户名和密码','error');
      const sliderOk=await ensureAdminSliderVerified();
      if(!sliderOk){await resetAdminSlider('请重新完成滑块验证');return;}
      try{
        const res=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:loginForm.username,password:loginForm.password,slider_token:adminSlider.token})});
        const data=await res.json();
        if(data.code===200){token.value=data.token;localStorage.setItem('ne21_admin_token',token.value);page.value='dashboard';loadAll();}
        else{await resetAdminSlider(data.msg||'用户名或密码错误，请重新完成滑块验证');}
      }catch(e){await resetAdminSlider('请求失败，请重新完成滑块验证');}
    }
    async function doForgot(){
      if(!forgotForm.email)return showMsg('请输入绑定邮箱','error');
      try{
        const res=await fetch('/admin/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:forgotForm.email})});
        const data=await res.json();
        if(data.code===200){resetForm.email=forgotForm.email;loginMode.value='reset';showMsg(data.msg||'验证码已发送');}
        else showMsg(data.msg||'发送失败','error',6000);
      }catch(e){showMsg('请求失败: '+e,'error');}
    }
    async function doReset(){
      if(!resetForm.email||!resetForm.code||!resetForm.newPassword)return showMsg('请填写完整','error');
      if(resetForm.newPassword!==resetForm.confirmPassword)return showMsg('两次密码不一致','error');
      try{
        const res=await fetch('/admin/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:resetForm.email,code:resetForm.code,new_password:resetForm.newPassword})});
        const data=await res.json();
        if(data.code===200){showMsg('密码已重置，请重新登录');setTimeout(()=>{loginMode.value='login';},1200);}
        else showMsg(data.msg||'重置失败','error',6000);
      }catch(e){showMsg('请求失败: '+e,'error');}
    }
    async function logout(){
      const old=token.value;
      if(old){try{await fetch('/admin/logout',{method:'POST',headers:{'Authorization':old}});}catch(e){}}
      localStorage.removeItem('ne21_admin_token');token.value='';page.value='login';loginMode.value='login';
    }

    // Load data
    async function loadAll(){
      await loadDashboard();
      await loadAdminAccount();
    }
    async function loadDashboard(){
      if(!token.value)return;
      try{
        const params=new URLSearchParams({start:dashStartDate.value,end:dashEndDate.value});
        const res=await safeFetch('/admin/dashboard?'+params,{headers:{'Authorization':token.value}});
        const data=await res.json();
        if(data.code===200&&data.data){dashboard.value=data.data;}
        else if(data.code===403){logout();showMsg('登录已过期','error');}
        else showMsg(data.msg||'获取首页统计失败','error');
      }catch(e){showMsg('获取首页统计失败: '+(e.message||e),'error',6000);}
    }
    function setQuickRange(type){
      const today=new Date().toISOString().slice(0,10);
      if(type==='today'){
        dashStartDate.value=today;
        dashEndDate.value=today;
      }else{
        const d=parseInt(type);
        const start=new Date(Date.now()-d*86400000).toISOString().slice(0,10);
        dashStartDate.value=start;
        dashEndDate.value=today;
      }
      loadDashboard();
    }
    async function loadUsers(){
      try{
        const res=await fetch('/admin/users',{headers:{'Authorization':token.value}});
        const data=await res.json();
        if(data.code===200){users.value=data.users||[];}
        else if(data.code===403){logout();showMsg('登录已过期','error');}
      }catch(e){showMsg('获取用户列表失败: '+e,'error');}
    }
    async function loadPaymentConfig(){
      try{
        const res=await fetch('/admin/payment-config',{headers:{'Authorization':token.value}});
        const data=await res.json();
        if(data.code===200){
          Object.assign(paymentConfig,data.config||{});
          paymentPlans.value=data.plans||[];
        }else if(data.code===403){logout();showMsg('登录已过期','error');}
        else showMsg(data.msg||'获取付费配置失败','error');
      }catch(e){showMsg('获取付费配置失败: '+e,'error');}
    }
    async function loadPayApiConfig(){
      try{
        const res=await fetch('/admin/pay-api-config',{headers:{'Authorization':token.value}});
        const data=await res.json();
        if(data.code===200){
          const cfg=data.config||{};
          Object.keys(payApiConfig).forEach(k=>{ if(cfg[k]!==undefined&&cfg[k]!==null)payApiConfig[k]=cfg[k]; });
        }
        else if(data.code===403){logout();showMsg('登录已过期','error');}
        else showMsg(data.msg||'获取支付接口配置失败','error');
      }catch(e){showMsg('获取支付接口配置失败: '+e,'error');}
    }
    async function loadAiLogs(page=aiLogFilter.page||1){
      if(!token.value)return;
      aiLogFilter.page=page;
      aiLogLoading.value=true;
      try{
        const qs=new URLSearchParams();
        qs.set('limit',String(aiLogFilter.limit||100));
        qs.set('page',String(aiLogFilter.page||1));
        if(aiLogFilter.status)qs.set('status',aiLogFilter.status);
        if(aiLogFilter.model)qs.set('model',aiLogFilter.model);
        if(aiLogFilter.keyword)qs.set('keyword',aiLogFilter.keyword);
        if(aiLogFilter.date_from)qs.set('date_from',aiLogFilter.date_from);
        if(aiLogFilter.date_to)qs.set('date_to',aiLogFilter.date_to);
        const res=await safeFetch('/admin/ai-logs?'+qs.toString(),{headers:{'Authorization':token.value}});
        const data=await res.json();
        if(data.code===200){aiLogs.value=data.logs||[];aiLogTotal.value=Number(data.total||0);}
        else if(data.code===403){logout();showMsg('登录已过期','error');}
        else showMsg(data.msg||'获取模型日志失败','error');
      }catch(e){showMsg('获取模型日志失败: '+(e.message||e),'error',6000);}
      finally{aiLogLoading.value=false;}
    }
    async function loadScriptLogs(page=scriptLogFilter.page||1){
      if(!token.value)return;
      scriptLogFilter.page=page;
      scriptLogLoading.value=true;

        const qs=new URLSearchParams();

        if(scriptLogFilter.level)qs.set('level',scriptLogFilter.level);
        if(scriptLogFilter.keyword)qs.set('keyword',scriptLogFilter.keyword);
        if(scriptLogFilter.date_from)qs.set('date_from',scriptLogFilter.date_from);
        if(scriptLogFilter.date_to)qs.set('date_to',scriptLogFilter.date_to);
        const res=await safeFetch('/admin/script-logs?'+qs.toString(),{headers:{'Authorization':token.value}});
        const data=await res.json();
        if(data.code===200){scriptLogs.value=data.logs||[];scriptLogTotal.value=Number(data.total||0);}
        else if(data.code===403){logout();showMsg('登录已过期','error');}
        else showMsg(data.msg||'获取脚本日志失败','error');
      }catch(e){showMsg('获取脚本日志失败: '+(e.message||e),'error',6000);}
      finally{scriptLogLoading.value=false;}
    }
    async function loadQuestionBank(page=questionBankFilter.page||1){
      if(!token.value)return;
      questionBankFilter.page=page;
      questionBankLoading.value=true;
      try{
        const qs=new URLSearchParams();
        qs.set('limit',String(questionBankFilter.limit||100));
        qs.set('page',String(questionBankFilter.page||1));
        if(questionBankFilter.keyword)qs.set('keyword',questionBankFilter.keyword);
        const res=await fetch('/admin/question-bank?'+qs.toString(),{headers:{'Authorization':token.value}});
        const data=await res.json();

      }catch(e){showMsg('获取题库失败: '+e,'error');}
      finally{questionBankLoading.value=false;}
    }
    async function loadLoginLocks(){
      if(!token.value)return;
      loginLockLoading.value=true;
      try{
        const res=await fetch('/admin/login-locks',{headers:{'Authorization':token.value}});
        const data=await res.json();
        if(data.code===200){loginLocks.value=data.locks||[];}

    function handleAvatarUpload(e){
      const file=e.target.files&&e.target.files[0];

      if(!file.type.startsWith('image/'))return showMsg('请选择图片文件','error');
      if(file.size>1024*1024)return showMsg('头像图片不能超过 1MB','error');
      const reader=new FileReader();
      reader.onload=function(){accountConfig.avatar_data=String(reader.result||'');};
      reader.readAsDataURL(file);

    async function changePassword(){

    async function clearAiLogs(){
      const hasFilter=aiLogFilter.status||aiLogFilter.model||aiLogFilter.keyword||aiLogFilter.date_from||aiLogFilter.date_to;
      if(!confirm(hasFilter?'确定按当前筛选条件清空模型调用日志吗？':'当前没有筛选条件，将清空全部模型调用日志，确定继续吗？'))return;

    async function unlockLoginLock(item){
      if(!item||!item.id)return;
      if(!confirm('确定解除该用户的登录锁定吗？'))return;
      try{
        const res=await fetch('/admin/login-locks/unlock',{method:'POST',headers:{'Content-Type':'application/json','Authorization':token.value},body:JSON.stringify({id:item.id})});

    function toggleLog(id){expandedLogs[id]=!expandedLogs[id];}

    // Provider
    function setProviders(nextProviders){
      config.value={...(config.value||{}),providers:nextProviders||{}};
    }
    async function adminPost(url,payload){
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':token.value},body:JSON.stringify(payload||{})});
      const data=await res.json();
      if(data.code===403){logout();showMsg('登录已过期','error');return null;}
      if(data.code!==200){showMsg(data.msg||'操作失败','error');return null;}
      if(data.config){config.value=data.config;}
      return data;
    }
    async function addProvider(){
      const key=(newProvider.key||'').trim();
      if(!key||!newProvider.title)return showMsg('请填写完整信息','error');
      const data=await adminPost('/admin/provider/add',{
        key,
        enabled:true,
        title:newProvider.title,
        protocol:newProvider.protocol,
        api_key:newProvider.api_key,
        base_url:newProvider.base_url,
        models:[]
      });
      if(!data)return;
      showAddModal.value=false;
      Object.assign(newProvider,{key:'',title:'',protocol:'openai',api_key:'',base_url:''});
      showMsg('添加成功，已写入数据库');
    }
    async function removeProvider(key){
      const data=await adminPost('/admin/provider/delete',{key});
      if(data)showMsg('删除成功，已从数据库删除');
    }
    function addModel(key){
      const oldProviders={...(config.value.providers||{})};
      const info={...(oldProviders[key]||{})};
      info.models=[...(info.models||[]),{value:'',label:'',weight:100,daily_token_limit:0}];
      oldProviders[key]=info;
      setProviders(oldProviders);
    }
    async function removeModel(key,idx){
      const model=(config.value.providers?.[key]?.models||[])[idx];
      if(model&&model.value){
        const data=await adminPost('/admin/model/delete',{key,idx});
        if(data)showMsg('模型删除成功，已从数据库删除');
        return;
      }
      const oldProviders={...(config.value.providers||{})};
      const info={...(oldProviders[key]||{})};
      info.models=(info.models||[]).filter((_,i)=>i!==idx);
      oldProviders[key]=info;
      setProviders(oldProviders);
    }
    function protocolName(p){const map={openai:'OpenAI 兼容',claude:'Claude',gemini:'Gemini'};return map[p]||p;}
    function statusText(s){return s==='success'?'成功':'失败';}
    function formatDuration(ms){
      ms=Number(ms||0);
      return ms>=1000?(ms/1000).toFixed(1)+'s':ms+'ms';
    }
    function shortText(text,len=160){
      text=(text==null?'':String(text));
      return text.length>len?text.slice(0,len)+'...':text;
    }
    function formatScriptExtra(log){
      try{
        const raw=log&&log.extra_json;
        if(!raw)return '';
        const e=typeof raw==='string'?JSON.parse(raw):raw;
        const parts=[];
        if(e.progress!=null)parts.push('进度 '+e.progress+'%');
        if(e.threshold!=null)parts.push('目标 '+e.threshold+'%');
        if(e.currentTime!=null&&e.duration!=null)parts.push('播放 '+e.currentTime+'/'+e.duration+' 秒');
        if(e.rate!=null)parts.push('设置倍速 '+e.rate+'×');
        if(e.actualRate!=null)parts.push('实际倍速 '+e.actualRate+'×');
        if(e.requirement)parts.push(String(e.requirement));
        return parts.join('｜');
      }catch(e){return '';}
    }
    function saveCollapsedProviders(){
      localStorage.setItem('ne21_collapsed_providers',JSON.stringify(collapsedProviders));
    }
    function toggleProvider(key){
      collapsedProviders[key]=!collapsedProviders[key];
      saveCollapsedProviders();
    }
    function collapseAllProviders(collapsed){
      Object.keys(config.value.providers||{}).forEach(k=>{collapsedProviders[k]=collapsed;});
      saveCollapsedProviders();
    }
    function togglePayApiSection(key){
      if(payApiCollapsed[key]===undefined)payApiCollapsed[key]=false;
      payApiCollapsed[key]=!payApiCollapsed[key];
    }
    function trendMax(){
      const vals=(dashboard.value.trend||[]).flatMap(r=>[Number(r.total||0),Number(r.success||0),Number(r.error||0)]);
      return Math.max(1,...vals);
    }
    function trendX(i){
      const rows=dashboard.value.trend||[];
      if(rows.length<=1)return 360; // 单点居中
      return 40+i*(620/Math.max(1,rows.length-1));
    }
    function trendY(v){
      const max=trendMax();
      return 205-(Number(v||0)/max)*170;
    }
    function trendPoints(key){
      const rows=dashboard.value.trend||[];
      if(!rows.length)return '';
      return rows.map((r,i)=>{
        const x=trendX(i);
        const y=trendY(r[key]);
        return x.toFixed(1)+','+y.toFixed(1);
      }).join(' ');
    }
    function stackBarX(i){
      const rows=dashboard.value.trend||[];
      const n=rows.length;
      if(n<=1)return 340;
      const step=620/Math.max(1,n);
      return 40+i*step+step/2-15;
    }
    function stackBarY(v){
      return 205-(Number(v||0)/trendMax())*170;
    }
    function stackBarH(v){
      const h=(Number(v||0)/trendMax())*170;
      return Math.max(2,h);
    }
    function modelBarWidth(v){
      const max=Math.max(1,...(dashboard.value.models||[]).map(m=>Number(m.total||0)));
      return Math.max(3,(Number(v||0)/max)*100)+'%';
    }
    function revMax(){
      const rows=dashboard.value.revenue?.trend||[];
      return Math.max(1,...rows.map(r=>Number(r.revenue||0)));
    }
    function revTrendX(i){
      const rows=dashboard.value.revenue?.trend||[];
      if(rows.length<=1)return 360;
      return 40+i*(620/Math.max(1,rows.length-1));
    }
    function revStep(){
      const rows=dashboard.value.revenue?.trend||[];
      return 620/Math.max(1,rows.length-1);
    }
    function revY(v){
      const max=revMax();
      return 170-(Number(v||0)/max)*140;
    }
    function revTrendPoints(){
      const rows=dashboard.value.revenue?.trend||[];
      if(!rows.length)return '';
      return rows.map((r,i)=>{
        const x=revTrendX(i);
        const y=revY(r.revenue);
        return x.toFixed(1)+','+y.toFixed(1);
      }).join(' ');
    }
    function revTrendArea(){
      const rows=dashboard.value.revenue?.trend||[];
      if(!rows.length)return '';
      const pts=rows.map((r,i)=>{
        const x=40+i*revStep();
        const y=revY(r.revenue);
        return x.toFixed(1)+','+y.toFixed(1);
      }).join(' ');
      const lastX=40+(rows.length-1)*revStep();
      return '40,170 '+pts+' '+lastX.toFixed(1)+',170';
    }

    if(token.value){page.value='dashboard';loadAll();}
    else initAdminSlider();

      questionBank,questionBankTotal,questionBankLoading,questionBankFilter,expandedBank,loginLocks,loginLockLoading,saveConfigLoading,collapsedProviders,dashboard,
      doLogin,doForgot,doReset,logout,saveConfig,saveEmailConfig,testEmail,changePassword,initAdminSlider,verifyAdminSlider,beginAdminPuzzle,
      loadConfig,loadEmailConfig,loadUsers,loadPaymentConfig,loadPayApiConfig,loadAdminAccount,loadAiLogs,clearAiLogs,loadScriptLogs,loadQuestionBank,clearQuestionBank,loadLoginLocks,unlockLoginLock,loadDashboard,dashStartDate,dashEndDate,setQuickRange,todayStr,d7ago,d30ago,d90ago,toggleLog,toggleBank,
      savePaymentConfig,savePayApiConfig,saveAdminAccount,handleAvatarUpload,newPlan,editPlan,savePlan,deletePlan,togglePlan,openUserEdit,saveUserAdmin,
      toggleProvider,collapseAllProviders,togglePayApiSection,
      addProvider,removeProvider,addModel,removeModel,
      protocolName,statusText,formatDuration,shortText,formatScriptExtra,trendPoints,trendX,trendY,trendMax,stackBarX,stackBarY,stackBarH,modelBarWidth,revTrendPoints,revTrendArea,revTrendX,revStep,revY,revMax,
      loadLogCleanup,saveLogCleanup,runLogCleanupNow,logRetentionDays,logCleanupSaving,logCleanupRunning,logCleanupResult
    };
  }
}).mount('#app');
