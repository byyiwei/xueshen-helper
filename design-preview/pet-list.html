<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宠物列表 - 龟上心</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #F7F9F8;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  .phone-frame {
    width: 375px;
    height: 812px;
    background: #F7F9F8;
    border-radius: 40px;
    box-shadow: 0 25px 80px rgba(27, 67, 50, 0.15), 0 8px 24px rgba(0,0,0,0.08);
    overflow: hidden;
    position: relative;
    border: 8px solid #1A1D1B;
  }
  .screen {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 100px;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* 导航栏 */
  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(247, 249, 248, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 12px 16px 8px;
    border-bottom: 1px solid #E2E6E4;
  }
  .nav-title {
    font-size: 18px;
    font-weight: 700;
    color: #1B4332;
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* 筛选卡片 */
  .filter-card {
    margin: 12px 16px 16px;
    padding: 16px;
    background: #FFFFFF;
    border-radius: 20px;
    box-shadow: 0 2px 12px rgba(27, 67, 50, 0.06);
    border: 1px solid rgba(27, 67, 50, 0.04);
  }
  .filter-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .filter-title {
    font-size: 15px;
    font-weight: 700;
    color: #1B4332;
    letter-spacing: 0.5px;
  }
  .filter-more {
    font-size: 12px;
    color: #6B756F;
    background: #F0F2F1;
    padding: 4px 12px;
    border-radius: 12px;
  }
  .filter-group-label {
    font-size: 11px;
    color: #9BA5A0;
    margin-bottom: 8px;
    display: block;
    letter-spacing: 0.5px;
  }
  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .chip {
    padding: 6px 14px;
    border-radius: 14px;
    font-size: 13px;
    background: #F7F9F8;
    color: #6B756F;
    border: 1px solid #E2E6E4;
    transition: all 0.2s;
  }
  .chip.active {
    background: linear-gradient(135deg, #1B4332 0%, #2D9A6E 100%);
    color: #FFFFFF;
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(27, 67, 50, 0.2);
  }
  .search-box {
    margin-top: 8px;
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 10px 16px 10px 36px;
    border-radius: 24px;
    border: 1px solid #E2E6E4;
    background: #F7F9F8;
    font-size: 14px;
    color: #2D332F;
    outline: none;
  }
  .search-input::placeholder { color: #9BA5A0; }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: #9BA5A0;
  }

  /* 宠物网格 */
  .pet-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px;
  }
  .pet-card {
    background: #FFFFFF;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(27, 67, 50, 0.06);
    border: 1px solid rgba(27, 67, 50, 0.04);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .pet-card:active {
    transform: scale(0.97);
    box-shadow: 0 4px 20px rgba(27, 67, 50, 0.12);
  }
  .pet-image-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 100%;
    background: linear-gradient(135deg, #E8F5EE 0%, #D1EBDD 100%);
  }
  .pet-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .pet-image-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }
  .gender-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    color: #FFFFFF;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .gender-badge.male {
    background: rgba(42, 111, 151, 0.85);
  }
  .gender-badge.female {
    background: rgba(199, 125, 95, 0.85);
  }
  .pet-card-info {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .pet-card-name {
    font-size: 15px;
    font-weight: 600;
    color: #1B4332;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pet-card-meta {
    font-size: 12px;
    color: #6B756F;
    background: #F0F2F1;
    align-self: flex-start;
    padding: 2px 10px;
    border-radius: 8px;
    border: 1px solid rgba(27, 67, 50, 0.05);
  }

  /* FAB */
  .fab {
    position: absolute;
    right: 20px;
    bottom: 100px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1B4332 0%, #2D9A6E 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(27, 67, 50, 0.3);
    color: #FFFFFF;
    font-size: 28px;
    font-weight: 300;
    z-index: 5;
  }

  /* Tab Bar */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 84px;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(20px) saturate(1.2);
    -webkit-backdrop-filter: blur(20px) saturate(1.2);
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    padding-top: 8px;
    border-top: 1px solid rgba(27, 67, 50, 0.06);
    z-index: 10;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 0;
    color: #9BA5A0;
    transition: color 0.3s;
  }
  .tab-item.active {
    color: #1B4332;
  }
  .tab-icon {
    font-size: 22px;
    margin-bottom: 2px;
  }
  .tab-text {
    font-size: 11px;
    font-weight: 500;
  }
  .tab-indicator {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: currentColor;
    margin-top: 4px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.3s;
  }
  .tab-item.active .tab-indicator {
    opacity: 1;
    transform: scale(1);
  }

  /* 空状态 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
  }
  .empty-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #E8F5EE 0%, #D1EBDD 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(27, 67, 50, 0.08);
  }
  .empty-text {
    font-size: 16px;
    color: #4A524D;
    font-weight: 500;
  }

  /* 底部安全区 */
  .safe-area {
    height: 34px;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="screen">
    <!-- 导航栏 -->
    <div class="nav-bar">
      <div class="nav-title">我的宠物</div>
    </div>

    <!-- 筛选卡片 -->
    <div class="filter-card">
      <div class="filter-head">
        <span class="filter-title">筛选</span>
        <span class="filter-more">更多</span>
      </div>
      <span class="filter-group-label">品种</span>
      <div class="filter-chips">
        <span class="chip active">全部</span>
        <span class="chip">巴西龟</span>
        <span class="chip">草龟</span>
        <span class="chip">鳄龟</span>
        <span class="chip">金钱龟</span>
      </div>
      <span class="filter-group-label">性别</span>
      <div class="filter-chips">
        <span class="chip active">全部</span>
        <span class="chip">公</span>
        <span class="chip">母</span>
        <span class="chip">未知</span>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" placeholder="搜索宠物名字..." readonly>
      </div>
    </div>

    <!-- 宠物网格 -->
    <div class="pet-grid">
      <div class="pet-card">
        <div class="pet-image-wrap">
          <div class="pet-image-placeholder">🐢</div>
          <span class="gender-badge male">公</span>
        </div>
        <div class="pet-card-info">
          <div class="pet-card-name">小黑</div>
          <span class="pet-card-meta">巴西龟 · 3岁</span>
        </div>
      </div>
      <div class="pet-card">
        <div class="pet-image-wrap">
          <div class="pet-image-placeholder">🐢</div>
          <span class="gender-badge female">母</span>
        </div>
        <div class="pet-card-info">
          <div class="pet-card-name">花花</div>
          <span class="pet-card-meta">草龟 · 5岁</span>
        </div>
      </div>
      <div class="pet-card">
        <div class="pet-image-wrap">
          <div class="pet-image-placeholder">🐢</div>
          <span class="gender-badge male">公</span>
        </div>
        <div class="pet-card-info">
          <div class="pet-card-name">大壮</div>
          <span class="pet-card-meta">鳄龟 · 2岁</span>
        </div>
      </div>
      <div class="pet-card">
        <div class="pet-image-wrap">
          <div class="pet-image-placeholder">🐢</div>
          <span class="gender-badge female">母</span>
        </div>
        <div class="pet-card-info">
          <div class="pet-card-name">金金</div>
          <span class="pet-card-meta">金钱龟 · 4岁</span>
        </div>
      </div>
      <div class="pet-card">
        <div class="pet-image-wrap">
          <div class="pet-image-placeholder">🐢</div>
          <span class="gender-badge male">公</span>
        </div>
        <div class="pet-card-info">
          <div class="pet-card-name">阿福</div>
          <span class="pet-card-meta">草龟 · 1岁</span>
        </div>
      </div>
      <div class="pet-card">
        <div class="pet-image-wrap">
          <div class="pet-image-placeholder">🐢</div>
          <span class="gender-badge female">母</span>
        </div>
        <div class="pet-card-info">
          <div class="pet-card-name">妞妞</div>
          <span class="pet-card-meta">巴西龟 · 6岁</span>
        </div>
      </div>
    </div>

    <div class="safe-area"></div>
  </div>

  <!-- FAB -->
  <div class="fab">+</div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item active">
      <span class="tab-icon">🐾</span>
      <span class="tab-text">宠物</span>
      <span class="tab-indicator"></span>
    </div>
    <div class="tab-item">
      <span class="tab-icon">📊</span>
      <span class="tab-text">足迹</span>
      <span class="tab-indicator"></span>
    </div>
    <div class="tab-item">
      <span class="tab-icon">👤</span>
      <span class="tab-text">我的</span>
      <span class="tab-indicator"></span>
    </div>
  </div>
</div>
</body>
</html>
