<script>
    // 高质量下载函数：确保生成144x144像素，边缘锐利，背景透明
    // 参数：elementToCapture - 要截图的DOM元素（已包含所有样式，宽高自适应）
    // 最终输出144x144 PNG，高清 (通过4倍超采样再降采样)
    async function downloadHighQualityPNG(elementToCapture, fileName) {
        if (!elementToCapture) return;
        try {
            // 获取元素当前计算尺寸，但我们希望强制输出为144x144，内部元素等比缩放
            // 为了达到最佳清晰度，克隆元素到一个固定尺寸 144x144 的容器，并使用 scale = 4 渲染，再缩至144
            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'fixed';
            tempContainer.style.top = '-9999px';
            tempContainer.style.left = '-9999px';
            tempContainer.style.width = '144px';
            tempContainer.style.height = '144px';
            tempContainer.style.backgroundColor = 'transparent';
            tempContainer.style.display = 'flex';
            tempContainer.style.alignItems = 'center';
            tempContainer.style.justifyContent = 'center';
            tempContainer.style.flexDirection = 'column';
            tempContainer.style.overflow = 'hidden';
            
            // 深克隆目标元素
            const clone = elementToCapture.cloneNode(true);
            // 重置克隆容器的样式，完全适配144x144区域
            clone.style.width = '100%';
            clone.style.height = '100%';
            clone.style.display = 'flex';
            clone.style.flexDirection = 'column';
            clone.style.alignItems = 'center';
            clone.style.justifyContent = 'center';
            clone.style.backgroundColor = 'transparent';
            clone.style.padding = '0';
            clone.style.margin = '0';
            clone.style.borderRadius = '0';
            clone.style.boxShadow = 'none';
            clone.style.backdropFilter = 'none';
            
            // 处理内部元素: 对于带文字版本，需要保证 .icon-wrapper 和 .brand-text 布局紧凑
            const iconWrap = clone.querySelector('.icon-wrapper');
            const brandTextDiv = clone.querySelector('.brand-text');
            if (iconWrap) {
                const svg = iconWrap.querySelector('.logo-svg');
                if (svg) {
                    // 根据是否有文字版本来适配尺寸
                    if (brandTextDiv && brandTextDiv.querySelector('.brand-name')) {
                        // 带文字版：SVG 大小 80x80，文字适中
                        svg.style.width = '80px';
                        svg.style.height = '80px';
                    } else {
                        // 纯图标版：SVG 大小 120x120
                        svg.style.width = '120px';
                        svg.style.height = '120px';
                    }
                }
                iconWrap.style.margin = '0';
            }
            if (brandTextDiv) {
                brandTextDiv.style.marginTop = '4px';
                const nameSpan = brandTextDiv.querySelector('.brand-name');
                if (nameSpan) {
                    nameSpan.style.fontSize = '26px';
                    nameSpan.style.letterSpacing = '2px';
                }
                // 确保没有副标题，已经不存在 .brand-sub
            }
            
            tempContainer.appendChild(clone);
            document.body.appendChild(tempContainer);
            
            // 使用 html2canvas 以高倍率渲染 (scale = 4) 获得超清源图
            const canvas = await html2canvas(tempContainer, {
                backgroundColor: null,       // 透明背景
                scale: 4,                   // 4倍超采样，实际渲染尺寸 576x576
                logging: false,
                useCORS: false,
                allowTaint: false,
                windowWidth: 144,
                windowHeight: 144
            });
            
            // 创建最终 144x144 的 canvas，进行高质量下采样
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = 144;
            finalCanvas.height = 144;
            const ctx = finalCanvas.getContext('2d');
            ctx.clearRect(0, 0, 144, 144);
            // 将高清 canvas 绘制到 144x144 (双线性插值，清晰且平滑)
            ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, 144, 144);
            
            // 导出 PNG
            const link = document.createElement('a');
            link.download = `${fileName}.png`;
            link.href = finalCanvas.toDataURL('image/png');
            link.click();
            
            // 清理临时元素
            document.body.removeChild(tempContainer);
        } catch (err) {
            console.error('高清截图失败: ', err);
            alert('生成图片失败，请刷新页面重试。');
        }
    }
    
    // 带文字下载 (只包含图标 + “龟上心”文字)
    const textCard = document.getElementById('logoCardWithText');
    const downloadTextBtn = document.getElementById('downloadTextLogoBtn');
    downloadTextBtn.addEventListener('click', () => {
        // 构建一个临时的干净组合: icon-wrapper + brand-text (仅龟上心)
        const originalIcon = textCard.querySelector('.icon-wrapper');
        const originalText = textCard.querySelector('.brand-text');
        if (!originalIcon || !originalText) {
            alert('未找到logo元素');
            return;
        }
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.flexDirection = 'column';
        container.style.alignItems = 'center';
        container.style.justifyContent = 'center';
        container.style.backgroundColor = 'transparent';
        container.style.padding = '0';
        const iconClone = originalIcon.cloneNode(true);
        const textClone = originalText.cloneNode(true);
        // 调整SVG尺寸由download函数内部处理，但这里保留默认
        container.appendChild(iconClone);
        container.appendChild(textClone);
        downloadHighQualityPNG(container, '龟上心_logo_带文字_144x144');
    });
    
    // 纯图标下载 (只截取 .icon-wrapper 内部)
    const pureCard = document.getElementById('logoCardPureIcon');
    const downloadIconBtn = document.getElementById('downloadIconBtn');
    downloadIconBtn.addEventListener('click', () => {
        const iconWrapper = pureCard.querySelector('.icon-wrapper');
        if (!iconWrapper) {
            alert('未找到图标');
            return;
        }
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.alignItems = 'center';
        container.style.justifyContent = 'center';
        container.style.backgroundColor = 'transparent';
        const iconClone = iconWrapper.cloneNode(true);
        container.appendChild(iconClone);
        downloadHighQualityPNG(container, '龟上心_logo_纯图标_144x144');
    });
    
    // 预览区纯图标克隆（用于界面小尺寸演示）
    function cloneIconToPreviews() {
        const pureSvg = document.querySelector('#logoCardPureIcon .logo-svg');
        if (!pureSvg) return;
        
        const previewSmall = document.getElementById('previewSmall');
        const previewMedium = document.getElementById('previewMedium');
        const previewLarge = document.getElementById('previewLarge');
        
        if (previewSmall) {
            const cloneSmall = pureSvg.cloneNode(true);
            cloneSmall.setAttribute('width', '40');

            cloneSmall.setAttribute('viewBox', '0 0 240 240');
            cloneSmall.style.width = '40px';
            cloneSmall.style.height = '40px';
            previewSmall.innerHTML = '';
            previewSmall.appendChild(cloneSmall);
        }
        
        if (previewMedium) {
            const cloneMed = pureSvg.cloneNode(true);
            cloneMed.setAttribute('width', '70');
            cloneMed.setAttribute('height', '70');
            cloneMed.setAttribute('viewBox', '0 0 240 240');
            cloneMed.style.width = '70px';
            cloneMed.style.height = '70px';
            previewMedium.innerHTML = '';
            previewMedium.appendChild(cloneMed);
        }
        
        if (previewLarge) {
            const cloneLarge = pureSvg.cloneNode(true);
            cloneLarge.setAttribute('width', '88');
            cloneLarge.setAttribute('height', '88');
            cloneLarge.setAttribute('viewBox', '0 0 240 240');
            cloneLarge.style.width = '88px';
            cloneLarge.style.height = '88px';
            const parent = previewLarge.parentNode;
            if (parent) {
                parent.replaceChild(cloneLarge, previewLarge);
                cloneLarge.id = 'previewLarge';
            }
        }
    }
    
    window.addEventListener('DOMContentLoaded', cloneIconToPreviews);
    window.addEventListener('load', cloneIconToPreviews);
</script>
